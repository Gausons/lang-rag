services:
  qdrant:
    image: qdrant/qdrant:v1.13.6
    ports:
      - '6333:6333'
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7.4
    ports:
      - '6379:6379'

  neo4j:
    image: neo4j:5.26
    ports:
      - '7474:7474'
      - '7687:7687'
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data

volumes:
  qdrant_data:
  neo4j_data:
